version: '3.8'

services:
  tradingview-gratis:
    image: ghcr.io/byronsliger/tradingview-gratis:latest
    container_name: tradingview-gratis
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - web

networks:
  web:
    driver: bridge
