version: '3.8'

services:
  caddy:
    image: ghcr.io/byronsliger/tradingview-caddy:latest
    container_name: caddy-tv
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  tradingview-gratis:
    image: ghcr.io/byronsliger/tradingview-gratis:latest
    container_name: tradingview-gratis
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
